name: Order LINE notify

on:
  schedule:
    # 每 15 分鐘檢查一次新訂單(GitHub 排程有時會延遲幾分鐘,屬正常)
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      test:
        description: "發送測試訊息(不檢查訂單)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check new orders
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          if [ "${{ inputs.test }}" = "true" ]; then
            python check_orders.py --test
          else
            python check_orders.py
          fi

      - name: Commit seen-order record
        run: |
          git config user.name "order-notify-bot"
          git config user.email "actions@github.com"
          git add last_seen_orders.json
          git diff --cached --quiet || git commit -m "Update seen orders [skip ci]"
          git pull --rebase origin master || true
          git push
