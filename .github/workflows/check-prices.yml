name: Daily price check & stock sync

on:
  schedule:
    # 每天 UTC 01:00 = 台灣時間早上 09:00
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price watch
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python price_watch.py

      # Salomon + On 每日庫存+價格同步:重新抓官網每個顏色每個尺寸的庫存,
      # 直接更新 Firebase,讓網站上的缺貨狀態最多只落後一天。
      # On 要逐頁抓約 1700 個顏色頁面,這步大約跑 40~60 分鐘屬正常。
      - name: Sync Salomon + On stock and prices
        run: python sync_stock.py

      - name: Commit updated price history
        run: |
          git config user.name "price-watcher-bot"
          git config user.email "actions@github.com"
          git add last_prices.json
          git diff --cached --quiet || git commit -m "Update recorded prices [skip ci]"
          git push
