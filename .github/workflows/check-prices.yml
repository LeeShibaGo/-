name: Daily price check & stock sync

on:
  schedule:
    # 每天 UTC 01:00 = 台灣時間早上 09:00
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 每個品牌各自的庫存/價格同步邏輯見 sync_stock.py 開頭的說明。
      # On、DESCENTE、Lacoste、AAPE 加起來要逐一抓好幾千個商品頁,這步
      # 跑 1.5~2.5 小時屬正常,merge_and_save() 已經處理過中途被其他
      # 寫入蓋掉的風險。
      - name: Sync all brands' stock and prices
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python sync_stock.py
